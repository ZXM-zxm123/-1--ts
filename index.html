<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>叠叠消游戏</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <h1>🎮 叠叠消游戏</h1>
    
    <div class="info-panel">
      <div class="info-item">
        <span class="label">分数:</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="info-item">
        <span class="label">关卡:</span>
        <span id="level" class="value">1</span>
      </div>
      <div class="info-item">
        <span class="label">步数:</span>
        <span id="steps" class="value">0</span>
      </div>
      <div class="info-item">
        <span class="label">最高分:</span>
        <span id="highScore" class="value">0</span>
      </div>
      <div class="info-item">
        <span class="label">目标分数:</span>
        <span id="targetScore" class="value">500</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="400" height="600"></canvas>
      <div id="gameMessage" class="game-message hidden"></div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label for="levelSelect">选择关卡:</label>
        <select id="levelSelect">
          <option value="1">关卡 1</option>
          <option value="2">关卡 2</option>
          <option value="3">关卡 3</option>
          <option value="4">关卡 4</option>
          <option value="5">关卡 5</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="themeSelect">选择主题:</label>
        <select id="themeSelect">
          <option value="candy">🍬 糖果</option>
          <option value="metal">⚙️ 金属</option>
          <option value="jungle">🌴 丛林</option>
        </select>
      </div>

      <button id="restartBtn" class="btn">重新开始</button>
    </div>

    <div class="instructions">
      <h3>游戏说明</h3>
      <ul>
        <li>← → 方向键移动方块</li>
        <li>空格键加速下落</li>
        <li>连续3个相同颜色的方块在同一列会消除得分</li>
        <li>被消除的方块上面的每一个方块额外+10分</li>
        <li>💣 炸弹：落地时炸毁相邻列的方块</li>
        <li>🟡 粘滞块：落地后暂时锁定该列3秒</li>
        <li>⚡ 加速器：加快方块下落速度</li>
        <li>🎨 变色块：随机改变当前方块颜色</li>
        <li>🧨 列炸弹：点击任意列消除底部3个方块</li>
        <li>P 键暂停游戏</li>
      </ul>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
